<!-- @dsCard group="Slides" viewport="1280x720" name="Feature — Image + Text" subtitle="Split layout with image slot" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="slide.css">
<script src="image-slot.js"></script>
<style>
  html, body { margin: 0; }
  .ft { flex-direction: row; padding: 0; }
  .ft__text { width: 46%; padding: var(--slide-pad); display: flex; flex-direction: column; justify-content: center; }
  .ft__text .eyebrow { display: block; margin-bottom: 20px; }
  .ft__h { font-size: 50px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.12; }
  .ft__text .rule { margin: 28px 0; }
  .ft__p { font-size: 19px; color: var(--text-body); line-height: 1.6; max-width: 24em; }
  .ft__img { flex: 1; position: relative; }
  .ft__img image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }
  .ft__tag { position: absolute; left: 32px; bottom: 32px; z-index: 2; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; padding: 8px 14px; border-radius: 999px; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide__body ft">
      <div class="ft__text">
        <span class="eyebrow">CASE · 03</span>
        <div class="ft__h">한 장의<br>표지가 말한다</div>
        <hr class="rule">
        <div class="ft__p">이미지는 가득 채우되, 글은 절제한다. 사진의 분위기가 메시지를 대신 전한다.</div>
      </div>
      <div class="ft__img">
        <span class="ft__tag">PROJECT</span>
        <image-slot id="feature-hero" shape="rect" fit="cover" placeholder="이미지를 끌어다 놓으세요"></image-slot>
      </div>
    </div>
    <div class="slide__foot" style="left:var(--slide-pad);right:auto;">
      <img class="slide__logo" src="../assets/logos/pinklab-logo-black.png" alt="PINKLAB">
    </div>
  </div>
</body>
</html>
