<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="slide.css">
<style>
  html, body { margin: 0; }
  .cover__body { justify-content: space-between; }
  .cover__top { display: flex; align-items: center; justify-content: space-between; }
  .cover__logo { height: 30px; width: auto; display: block; }
  .cover__meta { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray-400); }
  .cover__main .eyebrow { color: var(--pink-400); }
  .cover__title { margin-top: 22px; font-size: 92px; font-weight: 800; line-height: 1.02; letter-spacing: -0.03em; color: #fff; }
  .cover__title .reg { font-weight: 400; color: var(--gray-300); }
  .cover__title .pink { color: var(--accent); }
  .cover__sub { margin-top: 28px; font-size: 22px; color: var(--gray-300); max-width: 30em; line-height: 1.5; }
  .cover__bottom { display: flex; align-items: flex-end; justify-content: space-between; }
  .cover__date { font-size: 15px; color: var(--gray-400); }
</style>
</head>
<body>
  <div class="slide slide--ink">
    <div class="slide__body cover__body">
      <div class="cover__top">
        <img class="cover__logo" src="../assets/logos/pinklab-logo-white.png" alt="PINKLAB">
        <div class="cover__meta">Brand Deck</div>
      </div>

      <div class="cover__main">
        <div class="eyebrow">PINKLAB SLIDE · 2026</div>
        <div class="cover__title"><span class="reg">덜어낼수록</span><br>분명해지는 <span class="pink">디자인</span></div>
        <div class="cover__sub">화이트와 블랙 위에, 핑크는 단 하나의 포인트로. 점잖고 분명한 프레젠테이션 시스템.</div>
      </div>

      <div class="cover__bottom">
        <hr class="rule">
        <div class="cover__date">2026. 06 · Design Guide</div>
      </div>
    </div>
  </div>
</body>
</html>
