<!-- @dsCard group="Slides" viewport="1280x720" name="Closing — Thank You" subtitle="Quiet close, contact line" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="slide.css">
<style>
  html, body { margin: 0; }
  .cl__body { justify-content: center; }
  .cl__eyebrow { color: var(--pink-400); display: block; margin-bottom: 28px; }
  .cl__title { font-size: 100px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; color: #fff; }
  .cl__title .dot { color: var(--accent); }
  .cl__sub { margin-top: 32px; font-size: 20px; color: var(--gray-300); line-height: 1.6; max-width: 28em; }
  .cl__contact { position: absolute; left: var(--slide-pad); bottom: var(--slide-pad); display: flex; gap: 40px; font-size: 16px; color: var(--gray-400); }
  .cl__contact b { color: #fff; font-weight: 600; margin-right: 10px; }
  .cl__logo { position: absolute; right: var(--slide-pad); bottom: var(--slide-pad); height: 26px; width: auto; }
</style>
</head>
<body>
  <div class="slide slide--ink">
    <div class="slide__body cl__body">
      <span class="eyebrow cl__eyebrow">THANK YOU</span>
      <div class="cl__title">함께 만들어요<span class="dot">.</span></div>
      <div class="cl__sub">점잖고 분명한 한 장. 핑크랩 슬라이드 시스템으로 모든 발표를 같은 언어로.</div>
    </div>
    <div class="cl__contact">
      <span><b>web</b>pinklab.studio</span>
      <span><b>mail</b>hello@pinklab.studio</span>
    </div>
    <img class="cl__logo" src="../assets/logos/pinklab-logo-white.png" alt="PINKLAB">
  </div>
</body>
</html>
