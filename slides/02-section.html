<!-- @dsCard group="Slides" viewport="1280x720" name="Section Divider" subtitle="Big thin index + pink digit" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="slide.css">
<style>
  html, body { margin: 0; }
  .sec__body { justify-content: center; }
  .sec__num { font-size: 200px; font-weight: 800; line-height: 0.9; letter-spacing: -0.04em; color: var(--gray-900); }
  .sec__num .pink { color: var(--accent); }
  .sec__row { display: flex; align-items: flex-end; gap: 56px; }
  .sec__text { padding-bottom: 18px; }
  .sec__text .eyebrow { margin-bottom: 18px; display: block; }
  .sec__title { font-size: 56px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .sec__desc { margin-top: 18px; font-size: 20px; color: var(--text-muted); max-width: 22em; line-height: 1.55; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide__body sec__body">
      <div class="sec__row">
        <div class="sec__num">0<span class="pink">2</span></div>
        <div class="sec__text">
          <span class="eyebrow">SECTION</span>
          <div class="sec__title">디자인 원칙</div>
          <div class="sec__desc">핑크랩 슬라이드를 만드는 네 가지 기준. 절제, 위계, 여백, 그리고 한 점의 강조.</div>
        </div>
      </div>
    </div>
    <div class="slide__foot">
      <img class="slide__logo" src="../assets/logos/pinklab-logo-black.png" alt="PINKLAB">
      <span class="slide__page">0<b>2</b> / 09</span>
    </div>
  </div>
</body>
</html>
