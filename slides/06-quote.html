<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="slide.css">
<style>
  html, body { margin: 0; }
  .qt__body { justify-content: center; }
  .qt__rule { margin-bottom: 44px; }
  .qt__text { font-family: var(--font-serif-en); font-weight: 500; font-size: 68px; line-height: 1.28; letter-spacing: -0.01em; color: #fff; max-width: 14em; }
  .qt__text .accent { color: var(--pink-400); font-style: italic; }
  .qt__cite { margin-top: 48px; font-family: var(--font-sans); font-size: 18px; font-weight: 600; color: var(--gray-400); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="slide slide--ink">
    <div class="slide__body qt__body">
      <hr class="rule qt__rule">
      <div class="qt__text">Good design is not about adding, but <span class="accent">taking away</span>.</div>
      <div class="qt__cite">— 핑크랩 디자인 원칙</div>
    </div>
    <div class="slide__foot">
      <img class="slide__logo" src="../assets/logos/pinklab-logo-white.png" alt="PINKLAB">
      <span class="slide__page">0<b>6</b> / 09</span>
    </div>
  </div>
</body>
</html>
